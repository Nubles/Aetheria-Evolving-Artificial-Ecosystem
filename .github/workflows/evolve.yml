name: Scheduled Evolution Run

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allows manual triggering from GitHub Action tab

permissions:
  contents: write

jobs:
  evolve:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-size: '20'
          node-version: '20.x'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Headless Simulation Step
        run: npm run simulate

      - name: Push Changes
        run: |
          git config --global user.name "Aetheria Evolution Bot"
          git config --global user.email "evolution-bot@aetheria.local"
          git push origin master
